<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.8em' font-size='80' fill='%23ff003c' font-family='monospace' font-weight='bold'>&gt;_</text></svg>">
    <link rel="stylesheet" href="{{ site.baseurl }}/../css/style.css">
<script src="{{ site.baseurl }}/../js/script.js" defer></script>
</head>
<body>

    <div class="cyber-grid"></div>
    <canvas id="matrixCanvas"></canvas>

    <header>
        <nav class="nav-container">
            <a href="/" class="logo">0xPR3ST1JH0NN7 // {{ page.header_quote | default: "Hello, friend." }}</a>
            <ul class="nav-links">

                <li><a href="{{ '/' | relative_url }}" data-it="HOME" data-en="HOME">HOME</a></li>
                <li><a href="{{ '/publications/' | relative_url }}" data-it="PUBBLICAZIONI" data-en="PUBBLICATIONS">PUBBLICATIONS</a></li>
                <li><a href="{{ '/contacts/' | relative_url }}" data-it="CONTATTI" data-en="CONTACTS">CONTACTS</a></li>

                <li class="lang-switch">
                    <span id="lang-en" onclick="setLang('en')">EN</span> <span style="color:var(--text-muted)">/</span> 
                    <span id="lang-it" onclick="setLang('it')">IT</span>
                    
                </li>
            </ul>
        </nav>
    </header>

    {{ content }}

    <footer>
        <div class="footer-container">
            <p data-it="&copy; 2026 William Prestigiovanni. Tutti i diritti riservati." data-en="&copy; 2026 William Prestigiovanni. All rights reserved.">&copy; 2026 William Prestigiovanni. Tutti i diritti riservati.</p>
        </div>
    </footer>

</body>
</html>
