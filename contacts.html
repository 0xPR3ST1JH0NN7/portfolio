<main>
    <section id="contact" class="hero-section" style="border-bottom: none;">
        <h1 class="glitch-text" data-it="STABILISCI CONNESSIONE" data-en="ESTABLISH CONNECTION">STABILISCI CONNESSIONE</h1>
        
        <div class="contact-info">
            <p data-it="Per richieste di consulenza in ambito red teaming o collaborazioni compila il modulo sottostante." data-en="For red teaming consulting requests or collaborations, fill out the form below.">Per richieste di consulenza in ambito red teaming o collaborazioni compila il modulo sottostante.</p>
            <p><span class="accent-text">EMAIL //</span> <a href="mailto:info@williamprestigiovanni.com" style="color: var(--text-color); text-decoration: none;">info@williamprestigiovanni.com</a></p>
        </div>

        <div class="contact-form">
            <form action="https://formspree.io/f/placeholder" method="POST">
                <div class="form-group">
                    <label class="form-label" data-it="IDENTIFICATIVO (NOME)" data-en="IDENTIFIER (NAME)">IDENTIFICATIVO (NOME)</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label" data-it="INDIRIZZO DI RITORNO (EMAIL)" data-en="RETURN ADDRESS (EMAIL)">INDIRIZZO DI RITORNO (EMAIL)</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label" data-it="PAYLOAD (MESSAGGIO)" data-en="PAYLOAD (MESSAGE)">PAYLOAD (MESSAGGIO)</label>
                    <textarea name="message" class="form-control" required></textarea>
                </div>
                <button type="submit" class="cyber-btn" data-it="INVIA TRASMISSIONE" data-en="SEND TRANSMISSION" style="cursor: pointer; border-radius: 0;">INVIA TRASMISSIONE</button>
            </form>
        </div>
    </section>
</main>
